services:
  - type: web
    name: lms-core-api
    runtime: node
    rootDir: server
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
